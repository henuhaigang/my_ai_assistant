<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-container" class="login-container">
        <div class="login-box">
            <h1>AI Assistant</h1>
            <p>智能对话助手，随时为您效劳</p>
            <input type="text" id="username" placeholder="用户名" onkeypress="handleLoginKeyPress(event)">
            <input type="password" id="password" placeholder="密码" onkeypress="handleLoginKeyPress(event)">
            <button onclick="login()">登录</button>
        </div>
    </div>
    
    <!-- Chat Screen -->
    <div id="chat-container" class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-header-avatar">AI</div>
                <div class="chat-header-info">
                    <h2>AI 助手</h2>
                    <span>在线</span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        
        <div class="system-prompt-section">
            <div class="system-prompt-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                System Prompt (可选)
            </div>
            <input type="text" class="system-prompt-input" id="system-prompt" placeholder="设置 AI 助手的角色和行为..." value="You are a helpful assistant.">
        </div>
        
        <div class="messages-area" id="messages-area">
            <div class="welcome-message">
                <h2>👋 欢迎使用 AI 助手</h2>
                <p>我是您的智能对话助手，可以回答问题、编写代码、创作内容等。有什么我可以帮您的吗？</p>
            </div>
        </div>
        
        <div class="input-area">
            <!-- Uploaded File Preview -->
            <div class="uploaded-file-preview" id="uploaded-file-preview" style="display: none;">
                <div class="file-info">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span class="file-name" id="uploaded-file-name"></span>
                    <span class="file-size" id="uploaded-file-size"></span>
                </div>
                <button class="remove-file-btn" onclick="removeUploadedFile()" title="移除文件">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <!-- Upload Progress Indicator -->
            <div class="upload-progress-container" id="upload-progress-container" style="display: none;">
                <div class="progress-ring">
                    <svg viewBox="0 0 100 100" class="ring-svg">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#e0e0e0" stroke-width="6"></circle>
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="6" 
                                stroke-dasharray="283" stroke-dashoffset="226" class="progress-circle">
                        </circle>
                    </svg>
                    <div class="progress-text">
                        <span class="progress-percent">0%</span>
                        <span class="progress-label">上传中...</span>
                    </div>
                </div>
            </div>
            
            <div class="input-row">
                <span class="icon-btn" id="attach-btn" onclick="document.getElementById('file-input').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events: none;">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </span>
                <input type="file" id="file-input" class="file-hidden" accept=".pdf,.docx,.doc,.xlsx,.xls,.txt">
                
                <textarea id="input" class="chat-input" placeholder="输入消息..." onkeydown="handleKeyDown(event)"></textarea>
                
                <button type="button" class="send-btn" id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
