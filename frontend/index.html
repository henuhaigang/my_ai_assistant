<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; }
        .message { margin: 10px 0; padding: 8px; border-radius: 8px; }
        .user { background: #007aff; color: white; text-align: right; }
        .assistant { background: #e5e5ea; color: black; }
        #input { width: 100%; margin: 10px 0; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>AI Assistant</h1>
        <div>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登录</button>
        </div>
        <hr>
        <div id="chat-area" style="display:none;">
            <div id="messages"></div>
            <textarea id="input" rows="3" placeholder="输入消息..."></textarea>
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>
    <script>
        let token = localStorage.getItem('token');
        let currentConvId = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: formData
            });
            const data = await res.json();
            if (res.ok) {
                token = data.access_token;
                localStorage.setItem('token', token);
                document.getElementById('chat-area').style.display = 'block';
                loadConversations();
            } else {
                alert('登录失败');
            }
        }

        async function loadConversations() {
            const res = await fetch('/api/chat/conversations', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const convs = await res.json();
            if (convs.length) {
                currentConvId = convs[0].id;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value;
            if (!msg) return;
            input.value = '';
            addMessage('user', msg);
            const res = await fetch('/api/chat/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    conversation_id: currentConvId,
                    message: msg
                })
            });
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let assistantMsgDiv = null;
            let fullContent = '';
            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        fullContent += data;
                        if (!assistantMsgDiv) {
                            assistantMsgDiv = addMessage('assistant', fullContent);
                        } else {
                            assistantMsgDiv.innerHTML = fullContent;
                        }
                    }
                }
            }
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        if (token) {
            document.getElementById('chat-area').style.display = 'block';
            loadConversations();
        }
    </script>
</body>
</html>
